[package]
name = "desktopctl"
version = "0.1.0"
edition = "2021"

[dependencies]
async-stream = "0.3.6"
clap = { version = "4.5.38", features = ["derive"] }
futures = "0.3.31"
log = "0.4.27"
pretty_env_logger = "0.5.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
serde_repr = "0.1.20"
thiserror = "2.0.12"
tokio = { version = "1.45.0", features = ["io-util", "macros", "net", "rt", "rt-multi-thread"] }

[lints.rust]
missing_docs = "warn"

[lints.clippy]
pedantic = "warn"
style = "warn"
